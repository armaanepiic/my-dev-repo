<!DOCTYPE html>
<html lang="en">
<head>

  <title>Buttons</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main">
    <div class="buttons">
      <div class="b-one">
        <button class="one first">Button text</button>
        <button class="two first">Button text</button>
        <button class="three first">Button text</button>
        <button class="four first">Button text</button>
        <button class="five first">Button text</button>
      </div>
      <div class="b-two">
        <button class="one second">Button text</button>
        <button class="two second">Button text</button>
        <button class="three second">Button text</button>
        <button class="four second">Button text</button>
        <button class="five second">Button text</button>
      </div>
      <div class="b-three">
        <button class="one three">Button text</button>
        <button class="two three">Button text</button>
        <button class="three three">Button text</button>
        <button class="four three">Button text</button>
        <button class="five three">Button text</button>
      </div>
    </div>
  </div>
</body>
</html>
